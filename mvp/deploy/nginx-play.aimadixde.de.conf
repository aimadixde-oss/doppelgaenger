# ============================================================
# nginx-Block für Doppelgänger (play.aimadixde.de → Container :3003)
# ------------------------------------------------------------
# Ablage z. B.: /etc/nginx/sites-available/play.aimadixde.de
# dann verlinken:  ln -s ../sites-available/play.aimadixde.de /etc/nginx/sites-enabled/
# testen + neu laden:  nginx -t && systemctl reload nginx
#
# WICHTIG: Die map- und Upgrade-Header sind nötig, damit WebSockets
# (wss://) funktionieren. Das ist der Unterschied zu reinen HTTP-Proxys.
# ============================================================

# Einmal global (z. B. in /etc/nginx/conf.d/websocket.conf), falls noch nicht vorhanden:
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name play.aimadixde.de;

    # Certbot trägt hier nach dem ersten Lauf die 443-/SSL-Zeilen ein:
    #   certbot --nginx -d play.aimadixde.de

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;

        # WebSocket-Upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard-Header
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;  # lange offene WS-Verbindungen
    }
}
